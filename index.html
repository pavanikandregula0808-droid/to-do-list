<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Core Command & Analytics Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- HIGH DEFINITION NEON CYBER PALETTE --- */
        :root {
            --bg-main: linear-gradient(145deg, #10061e 0%, #050209 100%);
            --panel-solid: #0a0412;
            --panel-item: #130a20;
            --panel-glass: rgba(16, 7, 30, 0.7);
            
            --neon-cyan: #00f0ff;
            --neon-magenta: #ff007f;
            --neon-yellow: #ccff00;
            --neon-purple: #9d4edd;
            
            --text-pure: #ffffff;
            --text-high: #f1eef5;
            --text-mid: #a393b5;
            --text-muted: #4e3f63;
            
            --border-glow: rgba(157, 78, 221, 0.2);
            --cyan-glow: rgba(0, 240, 255, 0.25);
            
            --priority-high: var(--neon-magenta);
            --priority-medium: var(--neon-yellow);
            --priority-low: var(--neon-cyan);

            --radius-lg: 14px;
            --radius-md: 8px;
            --radius-sm: 4px;
            --transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-main);
            color: var(--text-high);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 24px;
            letter-spacing: 0.02em;
        }

        .dashboard-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
            width: 100%;
            max-width: 1100px;
        }

        @media (min-width: 900px) {
            .dashboard-grid {
                grid-template-columns: 380px 1fr;
            }
        }

        /* Generic Modular Container Box styling matching reference UI */
        .module-box {
            background: var(--panel-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        /* Left Pane: Analytics Panel */
        .analytics-pane {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .metrics-summary-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .mini-metric-card {
            background: var(--panel-solid);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-md);
            padding: 16px;
            text-align: center;
        }

        .mini-metric-card h3 { font-size: 11px; text-transform: uppercase; color: var(--text-mid); margin-bottom: 6px; }
        .mini-metric-card .value { font-size: 24px; font-weight: 800; color: var(--neon-cyan); text-shadow: 0 0 10px var(--cyan-glow); }

        .chart-box {
            background: var(--panel-solid);
            border: 1px solid var(--border-glow);
            border-radius: var(--radius-md);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            min-height: 220px;
        }

        /* Right Pane: Command Operations */
        .workspace-header { margin-bottom: 24px; }
        .brand-block { display: flex; align-items: center; gap: 14px; justify-content: space-between; }
        .title-group { display: flex; align-items: center; gap: 12px; }
        .brand-icon { color: var(--neon-cyan); border: 1px solid var(--neon-cyan); padding: 8px; border-radius: var(--radius-md); display: flex; box-shadow: 0 0 12px var(--cyan-glow); }
        h1 { font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .subtitle { font-size: 11px; color: var(--neon-purple); font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }

        .io-cluster { display: flex; gap: 6px; }
        .io-btn { background: var(--panel-solid); border: 1px solid var(--border-glow); color: var(--text-mid); padding: 8px; border-radius: var(--radius-md); cursor: pointer; display: flex; align-items: center; transition: var(--transition); }
        .io-btn:hover { border-color: var(--neon-cyan); color: var(--neon-cyan); }

        .search-container { margin: 20px 0; position: relative; }
        .search-input { width: 100%; padding: 12px 16px 12px 40px; background: var(--panel-solid); border: 1px solid var(--border-glow); border-radius: var(--radius-md); color: var(--text-pure); font-size: 13px; outline: none; transition: var(--transition); }
        .search-icon { position: absolute; left: 14px; top: 13px; color: var(--text-muted); pointer-events: none; }

        .form-input-row { display: flex; gap: 10px; padding: 4px; background: var(--panel-solid); border-radius: var(--radius-md); border: 1px solid var(--border-glow); transition: var(--transition); align-items: center; }
        .form-input-row input[type="text"] { flex: 1; background: transparent; border: none; padding: 12px 10px; color: var(--text-pure); font-size: 14px; outline: none; }
        .priority-select { background: var(--panel-item); color: var(--text-high); border: 1px solid var(--border-glow); padding: 10px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 700; outline: none; cursor: pointer; text-transform: uppercase; }
        .form-input-row:focus-within { border-color: var(--neon-cyan); box-shadow: 0 0 12px rgba(0, 240, 255, 0.15); }

        .btn { padding: 12px 18px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; border: none; transition: var(--transition); white-space: nowrap; }
        .btn-primary { background: transparent; color: var(--neon-cyan); border: 1px solid var(--neon-cyan); box-shadow: 0 0 8px var(--cyan-glow); }
        .btn-primary:hover { background: var(--neon-cyan); color: var(--panel-solid); box-shadow: 0 0 15px var(--neon-cyan); }

        .filter-dashboard { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-glow); padding-bottom: 16px; margin: 24px 0 16px 0; gap: 10px; }
        .filter-group { display: flex; gap: 4px; background: var(--panel-solid); padding: 4px; border-radius: var(--radius-md); }
        .filter-btn { background: transparent; border: none; color: var(--text-mid); padding: 6px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; border-radius: var(--radius-sm); cursor: pointer; transition: var(--transition); }
        .filter-btn.active { background: var(--panel-item); color: var(--neon-cyan); }

        .btn-clear-all { background: transparent; border: 1px solid rgba(255, 0, 127, 0.2); color: var(--neon-magenta); padding: 6px 12px; font-size: 11px; }
        .btn-clear-all:hover { background: var(--neon-magenta); color: white; }

        /* Dynamic Task Output Lists */
        .todo-list-container { list-style: none; display: flex; flex-direction: column; gap: 10px; }
        .todo-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; background: var(--panel-solid); border: 1px solid var(--border-glow); gap: 16px; border-radius: var(--radius-md); transition: var(--transition); position: relative; overflow: hidden; }
        .todo-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
        .todo-item.p-high::before { background-color: var(--priority-high); }
        .todo-item.p-medium::before { background-color: var(--priority-medium); }
        .todo-item.p-low::before { background-color: var(--priority-low); }

        .checkbox-hub { display: flex; align-items: center; cursor: pointer; position: relative; }
        .checkbox-hub input { position: absolute; opacity: 0; width: 0; height: 0; }
        .box-mark { height: 18px; width: 18px; border: 2px solid var(--text-muted); border-radius: var(--radius-sm); transition: var(--transition); }
        .checkbox-hub input:checked ~ .box-mark { background: var(--neon-cyan); border-color: transparent; box-shadow: 0 0 8px var(--neon-cyan); }
        .checkbox-hub input:checked ~ .box-mark::after { content: ""; position: absolute; left: 6px; top: 2px; width: 3px; height: 7px; border: solid #000; border-width: 0 2px 2px 0; transform: rotate(45deg); }

        .content-area { flex: 1; display: flex; flex-direction: column; gap: 2px; }
        .todo-text { font-size: 14px; font-weight: 600; color: var(--text-high); word-break: break-all; }
        .meta-row { display: flex; gap: 8px; align-items: center; }
        .time-stamp { font-size: 10px; color: var(--text-muted); }
        .priority-label { font-size: 9px; font-weight: 800; text-transform: uppercase; padding: 1px 4px; border-radius: 2px; }
        .p-high .priority-label { background: rgba(255, 0, 127, 0.1); color: var(--priority-high); }
        .p-medium .priority-label { background: rgba(204, 255, 0, 0.1); color: var(--priority-medium); }
        .p-low .priority-label { background: rgba(0, 240, 255, 0.1); color: var(--priority-low); }

        .todo-item.completed { background: rgba(13, 6, 20, 0.4); border-color: transparent; opacity: 0.4; }
        .todo-item.completed .todo-text { text-decoration: line-through; color: var(--text-muted); }

        .edit-mode-input { flex: 1; padding: 8px 12px; background: var(--panel-item); border: 1px solid var(--neon-purple); border-radius: var(--radius-sm); color: var(--text-pure); font-size: 14px; outline: none; }

        .action-cluster { display: flex; gap: 4px; opacity: 0; transition: var(--transition); }
        .todo-item:hover .action-cluster { opacity: 1; }
        .btn-action { padding: 6px 10px; border-radius: var(--radius-sm); font-size: 10px; font-weight: 700; text-transform: uppercase; background: var(--panel-item); color: var(--text-mid); border: 1px solid var(--border-glow); }
        .btn-danger:hover { color: var(--neon-magenta); border-color: var(--neon-magenta); }

        .empty-state-view { text-align: center; padding: 30px 0; color: var(--text-muted); font-size: 13px; text-transform: uppercase; }
        #hidden-file-input { display: none; }
    </style>
</head>
<body>
    <div class="dashboard-grid">
        
        <aside class="analytics-pane">
            <div class="module-box">
                <div class="metrics-summary-row">
                    <div class="mini-metric-card">
                        <h3>Total Logged</h3>
                        <div id="metric-total" class="value">0</div>
                    </div>
                    <div class="mini-metric-card">
                        <h3>Efficiency</h3>
                        <div id="metric-efficiency" class="value">0%</div>
                    </div>
                </div>
            </div>

            <div class="module-box">
                <h2 style="font-size: 12px; text-transform: uppercase; color: var(--text-mid); margin-bottom: 14px;">Operational Completion Matrix</h2>
                <div class="chart-box">
                    <canvas id="donutChart"></canvas>
                </div>
            </div>

            <div class="module-box">
                <h2 style="font-size: 12px; text-transform: uppercase; color: var(--text-mid); margin-bottom: 14px;">Priority Load Distribution</h2>
                <div class="chart-box">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </aside>

        <main class="module-box">
            <header class="workspace-header">
                <div class="brand-block">
                    <div class="title-group">
                        <div class="brand-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
                        </div>
                        <div>
                            <h1>System Operations</h1>
                            <p class="subtitle">Diagnostic Registry Matrix</p>
                        </div>
                    </div>
                    <div class="io-cluster">
                        <button id="btn-export-nodes" class="io-btn" title="Backup State Payload"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg></button>
                        <button id="btn-import-nodes" class="io-btn" title="Restore State Payload"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg></button>
                        <input type="file" id="hidden-file-input" accept=".json">
                    </div>
                </div>

                <div class="search-container">
                    <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="search-query-node" class="search-input" placeholder="SCAN ARTIFACT INDEX REGISTRY KEYS...">
                </div>
                
                <form id="todo-form" class="form-input-row">
                    <input type="text" id="todo-input" placeholder="INITIALIZE COMMAND ALLOCATION..." required autocomplete="off">
                    <select id="todo-priority" class="priority-select">
                        <option value="low">Low</option>
                        <option value="medium" selected>Medium</option>
                        <option value="high">High</option>
                    </select>
                    <button type="submit" class="btn btn-primary">Inject</button>
                </form>
            </header>

            <nav class="filter-dashboard">
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">All Specs</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
                <div class="dashboard-controls">
                    <button id="btn-clear-completed" class="btn btn-clear-all">Purge</button>
                    <div id="metrics-counter" class="badge">0 Open</div>
                </div>
            </nav>

            <ul id="todo-list-target" class="todo-list-container"></ul>
        </main>

    </div>

    <script>
        class StorageService {
            constructor(storageKey = 'sys_analytics_manifest') { this.storageKey = storageKey; }
            fetch() { try { const p = localStorage.getItem(this.storageKey); return p ? JSON.parse(p) : []; } catch (e) { return []; } }
            persist(d) { try { localStorage.setItem(this.storageKey, JSON.stringify(d)); } catch (e) {} }
        }

        class StateManager {
            constructor(initialData = []) { this.todos = initialData; }
            create(text, priority) {
                const item = { 
                    id: crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).substring(2, 9), 
                    text: text.trim(), 
                    priority: priority || 'medium',
                    timestamp: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    completed: false, isEditing: false 
                }; 
                this.todos = [...this.todos, item]; return this.todos; 
            }
            mutate(id, props) { this.todos = this.todos.map(t => t.id === id ? { ...t, ...props } : t); return this.todos; }
            destroy(id) { this.todos = this.todos.filter(t => t.id !== id); return this.todos; }
            purgeCompleted() { this.todos = this.todos.filter(t => !t.completed); return this.todos; }
            replaceDataset(newDataset) { if(Array.isArray(newDataset)) { this.todos = newDataset; } return this.todos; }
            select(filter, query = '') {
                return this.todos.filter(t => {
                    const matchesFilter = filter === 'active' ? !t.completed : filter === 'completed' ? t.completed : true;
                    const matchesQuery = t.text.toLowerCase().includes(query.toLowerCase());
                    return matchesFilter && matchesQuery;
                });
            }
            countUnresolved() { return this.todos.filter(t => !t.completed).length; }
            
            // Compiles real-time metrics calculations for Charts consumption
            getAnalyticsMetrics() {
                const total = this.todos.length;
                const completed = this.todos.filter(t => t.completed).length;
                const active = total - completed;
                const high = this.todos.filter(t => t.priority === 'high').length;
                const med = this.todos.filter(t => t.priority === 'medium').length;
                const low = this.todos.filter(t => t.priority === 'low').length;
                const efficiency = total ? Math.round((completed / total) * 100) : 0;
                return { total, active, completed, high, med, low, efficiency };
            }
        }

        class TodoApplication {
            constructor() {
                this.storage = new StorageService();
                this.state = new StateManager(this.storage.fetch());
                this.filter = 'all';
                this.searchQuery = '';
                
                // Analytics Charts Instances
                this.donutChart = null;
                this.radarChart = null;

                this.form = document.getElementById('todo-form');
                this.input = document.getElementById('todo-input');
                this.priorityInput = document.getElementById('todo-priority');
                this.listContainer = document.getElementById('todo-list-target');
                this.counterNode = document.getElementById('metrics-counter');
                this.filterBar = document.querySelector('.filter-dashboard');
                this.clearBtn = document.getElementById('btn-clear-completed');
                this.searchNode = document.getElementById('search-query-node');
                this.exportBtn = document.getElementById('btn-export-nodes');
                this.importBtn = document.getElementById('btn-import-nodes');
                this.fileInput = document.getElementById('hidden-file-input');

                this.initCharts();
                this.bindEvents(); 
                this.render();
            }

            initCharts() {
                // Configure global Chart.js style overrides to match neon purple aesthetic
                Chart.defaults.color = '#a393b5';
                Chart.defaults.font.family = 'Segoe UI, sans-serif';

                const ctxDonut = document.getElementById('donutChart').getContext('2d');
                this.donutChart = new Chart(ctxDonut, {
                    type: 'doughnut',
                    data: {
                        labels: ['Active', 'Purged/Completed'],
                        datasets: [{ data: [0, 0], backgroundColor: ['#00f0ff', '#ff007f'], borderColor: '#0a0412', borderWidth: 2 }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12 } } } }
                });

                const ctxRadar = document.getElementById('radarChart').getContext('2d');
                this.radarChart = new Chart(ctxRadar, {
                    type: 'radar',
                    data: {
                        labels: ['High Priority', 'Mid Priority', 'Low Priority'],
                        datasets: [{ label: 'Task Density Profile', data: [0, 0, 0], backgroundColor: 'rgba(157, 78, 221, 0.2)', borderColor: '#9d4edd', borderWidth: 2, pointBackgroundColor: '#00f0ff' }]
                    },
                    options: { responsive: true, maintainAspectRatio: false, scales: { r: { grid: { color: '#4e3f63' }, angleLines: { color: '#4e3f63' }, pointLabels: { font: { size: 10 } }, ticks: { display: false } } }, plugins: { legend: { display: false } } }
                });
            }

            bindEvents() {
                this.form.addEventListener('submit', (e) => this._handleAdd(e));
                this.filterBar.addEventListener('click', (e) => this._handleFilter(e));
                this.clearBtn.addEventListener('click', () => this._handlePurge());
                this.searchNode.addEventListener('input', (e) => this._handleSearch(e));
                this.exportBtn.addEventListener('click', () => this._handleExport());
                this.importBtn.addEventListener('click', () => this.fileInput.click());
                this.fileInput.addEventListener('change', (e) => this._handleImport(e));
                this.listContainer.addEventListener('click', (e) => this._handleDelegatedActions(e));
                this.listContainer.addEventListener('keydown', (e) => this._handleInlineKeys(e));
            }

            _handleSearch(e) { this.searchQuery = e.target.value; this.render(); }

            _handleExport() {
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.state.todos, null, 2));
                const anchor = document.createElement('a'); anchor.setAttribute("href", dataStr); anchor.setAttribute("download", `dashboard_matrix_${Date.now()}.json`); anchor.click();
            }

            _handleImport(e) {
                const file = e.target.files[0]; if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const parsed = JSON.parse(event.target.result);
                        this.storage.persist(this.state.replaceDataset(parsed)); this.render();
                    } catch (err) { alert("Matrix parsing failure."); }
                };
                reader.readAsText(file);
            }

            _escape(s) { const m = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#x27;' }; return s.replace(/[&<>"']/g, match => m[match]); }
            _handleAdd(e) { e.preventDefault(); const val = this.input.value.trim(); const pri = this.priorityInput.value; if (!val) return; this.storage.persist(this.state.create(val, pri)); this.input.value = ''; this.render(); }
            _handleFilter(e) { const btn = e.target.closest('.filter-btn'); if (!btn) return; this.filterBar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); this.filter = btn.dataset.filter; this.render(); }
            _handlePurge() { this.storage.persist(this.state.purgeCompleted()); this.render(); }

            _handleDelegatedActions(e) {
                const target = e.target; const row = target.closest('.todo-item'); if (!row) return; const id = row.dataset.id;
                if (target.classList.contains('checkbox-node')) { this._updateState(id, { completed: target.checked }); }
                else if (target.classList.contains('btn-delete')) { this.storage.persist(this.state.destroy(id)); this.render(); }
                else if (target.classList.contains('btn-edit')) { this._updateState(id, { isEditing: true }); const field = this.listContainer.querySelector(`[data-id="${id}"] .edit-mode-input`); field.focus(); field.setSelectionRange(field.value.length, field.value.length); }
                else if (target.classList.contains('btn-save')) { this._commitEdit(row, id); }
                else if (target.classList.contains('btn-cancel')) { this._updateState(id, { isEditing: false }); }
            }

            _handleInlineKeys(e) { if (!e.target.classList.contains('edit-mode-input')) return; const row = e.target.closest('.todo-item'); if (e.key === 'Enter') { this._commitEdit(row, row.dataset.id); } else if (e.key === 'Escape') { this._updateState(row.dataset.id, { isEditing: false }); } }
            _updateState(id, props) { this.storage.persist(this.state.mutate(id, props)); this.render(); }
            _commitEdit(row, id) { const val = row.querySelector('.edit-mode-input').value.trim(); this.storage.persist(val ? this.state.mutate(id, { text: val, isEditing: false }) : this.state.destroy(id)); this.render(); }

            _createItemElement(todo) {
                const li = document.createElement('li'); li.className = `todo-item p-${todo.priority} ${todo.completed ? 'completed' : ''}`; li.setAttribute('data-id', todo.id);
                if (todo.isEditing) {
                    li.innerHTML = `<input type="text" class="edit-mode-input" value="${this._escape(todo.text)}"><div class="action-cluster"><button class="btn btn-action btn-save">Save</button><button class="btn btn-action btn-cancel">Cancel</button></div>`;
                } else {
                    li.innerHTML = `<label class="checkbox-hub"><input type="checkbox" class="checkbox-node" ${todo.completed ? 'checked' : ''}><span class="box-mark"></span></label><div class="content-area"><span class="todo-text">${this._escape(todo.text)}</span><div class="meta-row"><span class="priority-label">${todo.priority}</span><span class="time-stamp">Logged at ${todo.timestamp}</span></div></div><div class="action-cluster"><button class="btn btn-action btn-edit">Edit</button><button class="btn btn-action btn-danger btn-delete">Purge</button></div>`;
                }
                return li;
            }

            _updateAnalyticsDisplay(metrics) {
                // Sync numerical badge variables
                document.getElementById('metric-total').textContent = metrics.total;
                document.getElementById('metric-efficiency').textContent = `${metrics.efficiency}%`;

                // Update Doughnut Engine Series
                this.donutChart.data.datasets[0].data = [metrics.active, metrics.completed];
                this.donutChart.update();

                // Update Radar Engine Series
                this.radarChart.data.datasets[0].data = [metrics.high, metrics.med, metrics.low];
                this.radarChart.update();
            }

            render() {
                const viewSegment = this.state.select(this.filter, this.searchQuery); this.listContainer.innerHTML = '';
                if (viewSegment.length === 0) {
                    const emptyLi = document.createElement('li'); emptyLi.className = 'empty-state-view'; emptyLi.textContent = 'NO ALLOCATIONS FOUND WITHIN COMMAND PARAMS.'; this.listContainer.appendChild(emptyLi);
                } else {
                    const fragment = document.createDocumentFragment(); viewSegment.forEach(todo => fragment.appendChild(this._createItemElement(todo))); this.listContainer.appendChild(fragment);
                }
                
                const unresolvedCount = this.state.countUnresolved(); this.counterNode.textContent = `${unresolvedCount} Open`;
                
                // Fire dynamic update payload recalculations across visualization frames
                this._updateAnalyticsDisplay(this.state.getAnalyticsMetrics());
            }
        }

        document.addEventListener('DOMContentLoaded', () => new TodoApplication());
    </script>
</body>
</html>
